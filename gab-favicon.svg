<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <style>
      .txt { font-family: Georgia, "Times New Roman", serif; font-weight: 400; }
      /* Adapte la couleur selon le thème navigateur */
      @media (prefers-color-scheme: dark) {
        .fg { fill: #ffffff; }
        .dot { fill: #ffffff; }
      }
      @media (prefers-color-scheme: light) {
        .fg { fill: #111111; }
        .dot { fill: #111111; }
      }
    </style>
  </defs>

  <!-- G -->
  <text x="1" y="24" class="txt fg" font-size="19" letter-spacing="-0.5">G</text>
  <!-- A (légèrement décalé pour équilibre visuel) -->
  <text x="10" y="24" class="txt fg" font-size="16" letter-spacing="0">A</text>
  <!-- B -->
  <text x="20" y="24" class="txt fg" font-size="16" letter-spacing="0">B</text>
  <!-- point discret en bas à droite -->
  <circle cx="30.5" cy="23.5" r="1.5" class="dot"/>
</svg>